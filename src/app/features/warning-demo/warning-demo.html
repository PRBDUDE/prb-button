<h1>Warning Demo</h1>
<div class="button-container">
  <plib-warning-button
    label="Warning Button"
    size="large"
  />
  <plib-warning-button
    label="Warning Button"
    size="small"
  />
  <plib-warning-button
    label="Warning Button"
    size="small"
    [disabled]="true"
  />
  <plib-warning-button
    label="Warning Button"
    size="small"
    [rounded]="true"
    [raised]="true"
    [icon]="'pi pi-exclamation-triangle'"
  />
  <plib-warning-button
    label="Warning Button"
    size="small"
    [rounded]="true"
    [raised]="true"
    [icon]="'pi pi-exclamation-triangle'"
    [iconPos]="'right'"
  />
</div>
