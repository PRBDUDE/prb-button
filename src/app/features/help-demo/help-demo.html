<h1>Help Demo</h1>

<div class="button-container">
  <plib-help-button
    label="Help Button"
    size="large"
  />
  <plib-help-button
    label="Help Button"
    size="small"
  />
  <plib-help-button
    label="Help Button"
    size="small"
    [disabled]="true"
  />
  <plib-help-button
    label="Help Button"
    size="small"
    [rounded]="true"
    [raised]="true"
    [icon]="'pi pi-question-circle'"
    [iconPos]="'right'"
  />
</div>
