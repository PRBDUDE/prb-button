<h1>Information Demo</h1>
<div class="button-container">
  <plib-information-button
    label="Information Button"
    size="large"
  />
  <plib-information-button
    label="Information Button"
    size="small"
  />
  <plib-information-button
    label="Information Button"
    size="small"
    [disabled]="true"
  />
  <plib-information-button
    label="Information Button"
    size="small"
    [rounded]="true"
    [raised]="true"
    [icon]="'pi pi-info-circle'"
    [iconPos]="'right'"
  />
</div>
