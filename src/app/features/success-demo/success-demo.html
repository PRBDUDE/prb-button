<h1>Success Demo</h1>
<div class="button-container">
  <plib-success-button
    label="Success Button"
    size="large"
  />
  <plib-success-button
    label="Success Button"
    size="small"
  />
  <plib-success-button
    label="Success Button"
    size="small"
    [disabled]="true"
  />
  <plib-success-button
    label="Success Button"
    size="small"
    [rounded]="true"
    [raised]="true"
    [icon]="'pi pi-check'"
    [iconPos]="'right'"
  />
</div>
