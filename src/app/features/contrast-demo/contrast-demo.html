<h1>Contrast Button Demo</h1>

<div class="button-container">
  <plib-contrast-button
    label="Contrast Button"
    size="large"
  />

  <plib-contrast-button
    label="Contrast Button"
    size="small"
    [icon]="'pi pi-check'"
  />

  <plib-contrast-button
    label="Contrast Button"
    size="small"
    [disabled]="true"
  />

  <plib-contrast-button
    label="Contrast Button"
    size="small"
    [rounded]="true"
    [raised]="true"
  />

  <plib-contrast-button
    label="Contrast Button"
    size="small"
    [rounded]="true"
    [raised]="true"
    [icon]="'pi pi-check'"
    [iconPos]="'right'"
  />
</div>
